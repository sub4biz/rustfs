<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title description" data-style="gradient" data-variant="glow" data-animated="true">
<title id="title">sub4biz/rustfs Star History</title>
<desc id="description">0 stars as of 2026-07-23. Daily cumulative star trend.</desc>
<defs>
<linearGradient id="trend" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#0284c7"/></linearGradient>
<linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#059669" stop-opacity="0.30"/><stop offset="55%" stop-color="#0284c7" stop-opacity="0.10"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0.01"/></linearGradient>
<radialGradient id="marker-halo" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0284c7" stop-opacity="0.55"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0"/></radialGradient>
<radialGradient id="surface-glow" cx="78%" cy="14%" r="80%"><stop offset="0%" stop-color="#0284c7" stop-opacity="0.14"/><stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/></radialGradient>
<filter id="trend-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7"/></filter>
</defs>
<style>
.trend-enter{transform-box:fill-box;transform-origin:center;animation:trend-enter 520ms cubic-bezier(0.16,1,0.3,1)}
.marker-enter{transform-box:fill-box;transform-origin:center;animation:marker-enter 320ms cubic-bezier(0.16,1,0.3,1) 200ms both}
.marker-pulse{transform-box:fill-box;transform-origin:center;animation:marker-pulse 2.6s ease-out infinite}
@keyframes trend-enter{from{opacity:.35;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes marker-enter{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes marker-pulse{0%{opacity:.5;transform:scale(.7)}70%,100%{opacity:0;transform:scale(2.1)}}
@media (prefers-reduced-motion:reduce){.trend-enter,.marker-enter,.marker-pulse{animation:none!important}}
@media (prefers-reduced-motion:reduce){.marker-pulse{opacity:0}}
</style>
